<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brackets — KaliArena Coach</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .bracket-rounds { display:flex; align-items:stretch; min-width:max-content; }
    .bracket-col { display:flex; flex-direction:column; min-width:10.5rem; padding:0 .875rem; }
    .bracket-col-header { text-align:center; font-size:.6875rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-foreground); padding-bottom:.75rem; white-space:nowrap; }
    .bracket-col-matches { flex:1; display:flex; flex-direction:column; }
    .bk-match-wrapper { flex:1; display:flex; align-items:center; padding:.3125rem 0; position:relative; }
    .bk-match-wrapper.pair-top::after { content:''; position:absolute; right:-.875rem; top:50%; width:.875rem; height:50%; border-top:1.5px solid var(--border); border-right:1.5px solid var(--border); }
    .bk-match-wrapper.pair-bot::after { content:''; position:absolute; right:-.875rem; top:0; width:.875rem; height:50%; border-bottom:1.5px solid var(--border); border-right:1.5px solid var(--border); }
    .bracket-col:not(:first-child) .bk-match-wrapper:not(.no-lc)::before { content:''; position:absolute; left:-.875rem; top:50%; width:.875rem; border-top:1.5px solid var(--border); }
    .bk-match { flex:1; border:1px solid var(--border); border-radius:.625rem; background:var(--background); overflow:hidden; }
    .bk-slot { display:flex; align-items:center; gap:.5rem; padding:.5rem .625rem; font-size:.8125rem; min-height:2.375rem; border-bottom:1px solid var(--border); }
    .bk-slot:last-child { border-bottom:none; }
    .bk-slot.mine { background:oklch(0.94 0.06 25/.3); font-weight:600; }
    .bk-slot.winner-s { background:oklch(0.95 0.06 140/.5); color:oklch(0.28 0.1 140); font-weight:600; }
    .bk-slot.bye-s { background:var(--muted); color:var(--muted-foreground); font-style:italic; }
    .bk-slot.empty-s { color:var(--muted-foreground); font-style:italic; }
    .slot-av { width:1.25rem; height:1.25rem; border-radius:50%; background:var(--primary); color:var(--primary-foreground); display:flex; align-items:center; justify-content:center; font-size:.5rem; font-weight:700; flex-shrink:0; }
    .slot-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .champion-box { flex:1; border:2px solid oklch(0.72 0.14 78); border-radius:.75rem; background:oklch(0.98 0.025 78); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.25rem .75rem; text-align:center; gap:.375rem; }
    .bk-canvas { overflow:auto; border:1px solid var(--border); border-radius:.875rem; background:var(--card); padding:1.25rem 1rem; min-height:14rem; }
    .ev-card { border:1px solid var(--border); border-radius:.875rem; background:var(--card); padding:1.125rem; margin-bottom:1rem; }
    .ev-card-title { font-weight:700; font-size:1.0625rem; margin-bottom:.25rem; }
    .ev-card-meta { font-size:.8125rem; color:var(--muted-foreground); margin-bottom:.875rem; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="KaliArena" style="height:2rem;width:auto;object-fit:contain;flex-shrink:0;"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Brackets</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Tournament Brackets</h1>
              <p class="page-subtitle">View brackets for events you are registered in. Your team is highlighted.</p>
            </div>
          </div>

          <div id="brackets-list">
            <div class="text-sm text-muted">Loading…</div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'brackets.html';
    let userId;
    let myTeamName = null; // coach's team name for highlight

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      userId = ctx.session.user.id;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);

      // Get coach's team name for highlight
      const { data: teamRow } = await window.db.from('teams').select('name').eq('coach_id', userId).maybeSingle();
      myTeamName = teamRow?.name || null;

      const { data: regs } = await window.db
        .from('competition_registrations')
        .select('competition_id, division_id, competitions(id,name,status,start_date,end_date,location,competition_type), event_divisions(gender,age_min,age_max,weight_category)')
        .eq('coach_id', userId);

      const container = document.getElementById('brackets-list');
      const events = (regs || []).map(r => ({ ev: r.competitions, div: r.event_divisions })).filter(x => x.ev);

      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i data-lucide="swords"></i>
            <h3>No brackets yet</h3>
            <p>You haven't joined any competitions. <a href="events.html" style="color:var(--primary);font-weight:500;">Browse events</a> to register.</p>
          </div>`;
        refreshIcons();
        showApp();
        return;
      }

      // Load brackets for each event
      const evIds = [...new Set(events.map(x => x.ev.id))];
      const { data: allRows } = await window.db
        .from('brackets')
        .select('competition_id,round,match_order,player1_id,player1_name,player2_id,player2_name,winner_id,winner_name')
        .in('competition_id', evIds)
        .order('round').order('match_order');

      const rowsByEvent = {};
      for (const row of (allRows || [])) {
        if (!rowsByEvent[row.competition_id]) rowsByEvent[row.competition_id] = [];
        rowsByEvent[row.competition_id].push(row);
      }

      container.innerHTML = events.map(({ ev, div }) => {
        const rows = rowsByEvent[ev.id] || [];
        const divLabel = div ? divisionLabelStr(div) : null;
        return `
          <div class="ev-card">
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div>
                <div class="ev-card-title">${escHtml(ev.name)}</div>
                <div class="ev-card-meta">
                  ${ev.location ? `<i data-lucide="map-pin" style="width:.7rem;height:.7rem;display:inline;vertical-align:middle;"></i> ${escHtml(ev.location)} &nbsp;·&nbsp; ` : ''}
                  <i data-lucide="calendar" style="width:.7rem;height:.7rem;display:inline;vertical-align:middle;"></i>
                  ${formatDate(ev.start_date)}${ev.end_date ? ' – ' + formatDate(ev.end_date) : ''}
                  ${ev.competition_type ? ` &nbsp;·&nbsp; ${escHtml(ev.competition_type)}` : ''}
                </div>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                ${divLabel ? `<span class="badge ${divisionBadgeCls(div)}" style="font-size:.7rem;">${escHtml(divLabel)}</span>` : ''}
                ${statusBadge(ev.status)}
              </div>
            </div>
            ${rows.length > 0
              ? `<div class="bk-canvas">${renderBracketHtml(rows)}</div>`
              : `<div style="background:var(--muted);border-radius:.5rem;padding:1rem;text-align:center;color:var(--muted-foreground);font-size:.875rem;">
                  <i data-lucide="git-branch" style="width:1.25rem;height:1.25rem;margin:0 auto .375rem;display:block;opacity:.4;"></i>
                  Bracket not published yet
                </div>`
            }
          </div>`;
      }).join('');

      showApp();
      refreshIcons();
    }

    function divisionLabelStr(d) {
      const g = d.gender === 'girls' ? 'Girls' : d.gender === 'mixed' ? 'Mixed' : 'Boys';
      const age = (d.age_min && d.age_max) ? `${d.age_min}–${d.age_max} yrs`
                : d.age_min ? `${d.age_min}+ yrs` : d.age_max ? `Under ${d.age_max} yrs` : '';
      return [g, age, d.weight_category].filter(Boolean).join(' · ');
    }
    function divisionBadgeCls(d) {
      return d.gender === 'girls' ? 'badge-primary' : d.gender === 'mixed' ? 'badge-gray' : 'badge-blue';
    }

    function renderBracketHtml(rows) {
      // Determine rounds
      const maxRound = Math.max(...rows.map(r => r.round));
      const bracket = [];
      for (let r = 0; r < maxRound; r++) {
        const rRows = rows.filter(x => x.round === r + 1).sort((a,b) => a.match_order - b.match_order);
        bracket.push(rRows.map(x => ({
          p1:     x.player1_name ? { name: x.player1_name, coachId: x.player1_id } : null,
          p2:     x.player2_name ? { name: x.player2_name, coachId: x.player2_id } : null,
          winner: x.winner_name  ? { name: x.winner_name,  coachId: x.winner_id  } : null,
        })));
      }

      const roundLabel = r => {
        const rem = maxRound - r;
        if (rem===1) return 'Final';
        if (rem===2) return 'Semifinal';
        if (rem===3) return 'Quarterfinal';
        return `Round ${r+1}`;
      };

      let html = '<div class="bracket-rounds">';
      for (let r = 0; r < bracket.length; r++) {
        html += `<div class="bracket-col"><div class="bracket-col-header">${roundLabel(r)}</div><div class="bracket-col-matches">`;
        for (let m = 0; m < bracket[r].length; m++) {
          const match = bracket[r][m];
          const pc = r < maxRound-1 ? (m%2===0 ? 'pair-top' : 'pair-bot') : '';
          html += `<div class="bk-match-wrapper ${pc}"><div class="bk-match">
            ${slotHtml(match.p1, match.winner)}
            ${slotHtml(match.p2, match.winner)}
          </div></div>`;
        }
        html += '</div></div>';
      }

      const fin = bracket[maxRound-1]?.[0];
      if (fin?.winner) {
        html += `<div class="bracket-col"><div class="bracket-col-header">Champion</div>
          <div class="bracket-col-matches"><div class="bk-match-wrapper no-lc">
            <div class="champion-box">
              <i data-lucide="crown" style="width:1.75rem;height:1.75rem;color:oklch(0.72 0.14 78);"></i>
              <div style="font-size:.6875rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:oklch(0.55 0.1 78);">Champion</div>
              <div style="font-size:1rem;font-weight:700;">${escHtml(fin.winner.name)}</div>
            </div>
          </div></div></div>`;
      }
      html += '</div>';
      return html;
    }

    function slotHtml(p, winner) {
      const isEmpty  = p === null;
      const isBye    = p?.name === 'BYE';
      const isWinner = !isEmpty && !isBye && winner &&
        (winner.coachId === p.coachId || winner.name === p.name);
      const isMe     = !isEmpty && !isBye && myTeamName && p.name === myTeamName;

      let cls = 'bk-slot';
      if (isEmpty) cls += ' empty-s';
      else if (isBye) cls += ' bye-s';
      if (isWinner) cls += ' winner-s';
      if (isMe && !isWinner) cls += ' mine';

      let inner = '';
      if (isEmpty) {
        inner = `<span class="slot-name">TBD</span>`;
      } else if (isBye) {
        inner = `<span class="slot-name">— BYE —</span>`;
      } else {
        inner = `<div class="slot-av">${getInitials(p.name)}</div>
          <span class="slot-name" title="${escHtml(p.name)}">${escHtml(p.name)}</span>
          ${isMe ? `<span style="font-size:.625rem;color:var(--primary);font-weight:700;flex-shrink:0;">YOU</span>` : ''}
          ${isWinner ? `<i data-lucide="crown" style="width:.75rem;height:.75rem;color:oklch(0.6 0.14 78);flex-shrink:0;"></i>` : ''}`;
      }
      return `<div class="${cls}">${inner}</div>`;
    }

    init();
  </script>
</body>
</html>
