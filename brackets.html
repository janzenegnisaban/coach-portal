<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brackets — KaliArena Coach</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .bracket-event { border: 1px solid var(--border); border-radius: .875rem; background: var(--card); padding: 1.25rem; margin-bottom: 1rem; }
    .bracket-event-title { font-weight: 700; font-size: 1.0625rem; margin-bottom: .375rem; }
    .bracket-event-meta { font-size: .8125rem; color: var(--muted-foreground); margin-bottom: 1rem; }
    .bracket-placeholder { background: var(--muted); border-radius: .5rem; padding: 1rem; text-align: center; color: var(--muted-foreground); font-size: .875rem; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Brackets</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Tournament Brackets</h1>
              <p class="page-subtitle">View bracket structures for competitions you're registered in.</p>
            </div>
          </div>

          <div id="brackets-list">
            <div class="text-sm text-muted">Loading…</div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'brackets.html';

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);

      const { data: regs } = await window.db
        .from('competition_registrations')
        .select('competition_id, competitions(id, name, status, start_date, end_date, location, competition_type)')
        .eq('coach_id', ctx.session.user.id);

      const container = document.getElementById('brackets-list');
      const events = (regs || []).map(r => r.competitions).filter(Boolean);

      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i data-lucide="swords"></i>
            <h3>No brackets available</h3>
            <p>You haven't registered for any competitions yet. <a href="events.html" style="color:var(--primary);font-weight:500;">Browse events</a> to join one.</p>
          </div>`;
        refreshIcons();
        showApp();
        return;
      }

      container.innerHTML = events.map(ev => `
        <div class="bracket-event">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <div class="bracket-event-title">${escHtml(ev.name)}</div>
              <div class="bracket-event-meta">
                ${ev.location ? `<i data-lucide="map-pin" style="width:.75rem;height:.75rem;display:inline;vertical-align:middle;"></i> ${escHtml(ev.location)} &nbsp;·&nbsp; ` : ''}
                <i data-lucide="calendar" style="width:.75rem;height:.75rem;display:inline;vertical-align:middle;"></i>
                ${formatDate(ev.start_date)}${ev.end_date ? ' – ' + formatDate(ev.end_date) : ''}
                ${ev.competition_type ? ` &nbsp;·&nbsp; ${escHtml(ev.competition_type)}` : ''}
              </div>
            </div>
            ${statusBadge(ev.status)}
          </div>
          <div class="bracket-placeholder">
            <i data-lucide="git-branch" style="width:1.5rem;height:1.5rem;margin:0 auto .5rem;display:block;opacity:.4;"></i>
            Bracket draw for <strong>${escHtml(ev.name)}</strong> will be published here once the competition begins.<br>
            <a href="schedule.html" style="color:var(--primary);font-size:.8125rem;font-weight:500;margin-top:.5rem;display:inline-block;">View match schedule →</a>
          </div>
        </div>
      `).join('');

      showApp();
      refreshIcons();
    }

    init();
  </script>
</body>
</html>
