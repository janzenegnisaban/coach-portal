<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — KaliArena Coach</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Events</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Events</h1>
              <p class="page-subtitle">Browse and join organizer-created competitions.</p>
            </div>
          </div>

          <div class="section-title" style="margin-bottom:.75rem;"><i data-lucide="check-circle"></i> My Registrations</div>
          <div id="my-events" style="margin-bottom:2rem;">
            <div class="text-sm text-muted">Loading…</div>
          </div>

          <div class="section-title" style="margin-bottom:.75rem;"><i data-lucide="calendar-days"></i> Available Events</div>
          <div id="available-events">
            <div class="text-sm text-muted">Loading…</div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'events.html';
    let userId;
    let registeredIds = new Set();

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      userId = ctx.session.user.id;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);
      await loadEvents();
      showApp();
      refreshIcons();
    }

    async function loadEvents() {
      const [regsRes, eventsRes] = await Promise.all([
        window.db.from('competition_registrations').select('competition_id, competitions(id, name, status, start_date, end_date, location)').eq('coach_id', userId),
        window.db.from('competitions').select('*').eq('admin_approval_status', 'approved').eq('is_public', true).order('start_date'),
      ]);

      const regs = regsRes.data || [];
      registeredIds = new Set(regs.map(r => r.competition_id));

      // My registrations
      const myEl = document.getElementById('my-events');
      if (regs.length === 0) {
        myEl.innerHTML = `<div class="empty-state"><i data-lucide="calendar-days"></i><h3>Not registered yet</h3><p>Join events from the list below.</p></div>`;
      } else {
        myEl.innerHTML = `<div class="card"><div class="card-content" style="padding:.75rem;">` +
          regs.map(r => {
            const ev = r.competitions;
            return ev ? `
              <div class="flex items-center gap-3" style="padding:.75rem;border-bottom:1px solid var(--border);">
                <div class="stat-icon tile-emerald" style="width:2rem;height:2rem;border-radius:.5rem;flex-shrink:0;"><i data-lucide="check-circle" style="width:.875rem;height:.875rem;"></i></div>
                <div class="flex-1 truncate">
                  <div class="font-medium text-sm truncate">${escHtml(ev.name)}</div>
                  <div class="text-xs text-muted">${ev.location ? escHtml(ev.location) + ' · ' : ''}${formatDate(ev.start_date)}</div>
                </div>
                ${statusBadge(ev.status)}
              </div>
            ` : '';
          }).join('') + `</div></div>`;
      }

      // Available events
      const events = (eventsRes.data || []).filter(e => !registeredIds.has(e.id));
      const availEl = document.getElementById('available-events');
      if (events.length === 0) {
        availEl.innerHTML = `<div class="empty-state"><i data-lucide="calendar-days"></i><h3>No available events</h3><p>No open competitions to join right now.</p></div>`;
      } else {
        availEl.innerHTML = `<div style="display:grid;gap:.75rem;">` +
          events.map(ev => `
            <div class="card">
              <div class="card-content" style="padding:1rem;">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1">
                    <div class="font-semibold">${escHtml(ev.name)}</div>
                    ${ev.description ? `<div class="text-sm text-muted mt-1">${escHtml(ev.description)}</div>` : ''}
                    <div class="flex gap-3 text-xs text-muted mt-2 flex-wrap">
                      ${ev.location ? `<span><i data-lucide="map-pin" style="width:.75rem;height:.75rem;display:inline;vertical-align:middle;"></i> ${escHtml(ev.location)}</span>` : ''}
                      <span><i data-lucide="calendar" style="width:.75rem;height:.75rem;display:inline;vertical-align:middle;"></i> ${formatDate(ev.start_date)}${ev.end_date ? ' – ' + formatDate(ev.end_date) : ''}</span>
                      ${ev.registration_deadline ? `<span>Deadline: ${formatDate(ev.registration_deadline)}</span>` : ''}
                    </div>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="joinEvent('${ev.id}', this)">
                    <i data-lucide="plus"></i> Join
                  </button>
                </div>
              </div>
            </div>
          `).join('') + `</div>`;
      }
      refreshIcons();
    }

    async function joinEvent(eventId, btn) {
      btn.disabled = true;
      btn.textContent = 'Joining…';
      const { error } = await window.db.from('competition_registrations').insert({ competition_id: eventId, coach_id: userId, status: 'registered' });
      if (error) {
        showToast(error.message || 'Failed to join event', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="plus"></i> Join';
        refreshIcons();
        return;
      }
      showToast('Successfully joined event!', 'success');
      await loadEvents();
      refreshIcons();
    }

    init();
  </script>
</body>
</html>
