<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — KaliArena Admin</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <!-- Approve/Reject Dialog -->
  <div class="dialog-overlay hidden" id="review-dialog">
    <div class="dialog">
      <div class="dialog-title" id="review-title">Review Event</div>
      <div class="dialog-description" id="review-desc"></div>
      <input type="hidden" id="review-event-id">
      <div id="reject-reason-wrap" class="hidden">
        <div class="form-group">
          <label class="form-label">Rejection reason (optional)</label>
          <textarea id="reject-reason" class="form-input" placeholder="Explain why this event is rejected…"></textarea>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" onclick="closeDialog('review-dialog')">Cancel</button>
        <button class="btn btn-destructive btn-sm" id="reject-btn" onclick="submitReject()"><i data-lucide="x-circle"></i> Reject</button>
        <button class="btn btn-primary btn-sm" id="approve-btn" onclick="submitApprove()"><i data-lucide="check-circle"></i> Approve</button>
      </div>
    </div>
  </div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="KaliArena" style="height:2rem;width:auto;object-fit:contain;flex-shrink:0;"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Events</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Events</h1>
              <p class="page-subtitle">All competitions — including organizer-submitted events awaiting approval.</p>
            </div>
          </div>

          <div class="flex gap-2 mb-4 flex-wrap" id="filter-tabs">
            <button class="btn btn-primary btn-sm"   data-f="all"      onclick="setFilter('all',this)">All</button>
            <button class="btn btn-secondary btn-sm" data-f="pending"  onclick="setFilter('pending',this)">Pending Approval</button>
            <button class="btn btn-secondary btn-sm" data-f="approved" onclick="setFilter('approved',this)">Approved</button>
            <button class="btn btn-secondary btn-sm" data-f="rejected" onclick="setFilter('rejected',this)">Rejected</button>
          </div>

          <div class="table-wrap">
            <div class="table-toolbar">
              <div class="search-input-wrap">
                <i data-lucide="search"></i>
                <input type="text" id="search" class="form-input search-input" placeholder="Search events…" oninput="filterList(this.value)">
              </div>
              <span class="text-sm text-muted" id="event-count"></span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr><th>Event</th><th>Type</th><th>Start Date</th><th>Status</th><th>Approval</th><th></th></tr>
                </thead>
                <tbody id="events-tbody">
                  <tr><td colspan="6" class="table-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'events.html';
    let allEvents = [];
    let currentFilter = 'all';
    let adminId;

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      adminId = ctx.session.user.id;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);
      await loadEvents();
      showApp();
      refreshIcons();
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('#filter-tabs button').forEach(b => {
        b.className = b === btn ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm';
      });
      renderEvents();
    }

    async function loadEvents() {
      const { data } = await window.db
        .from('competitions')
        .select('*, profiles!coach_id(first_name, last_name, email)')
        .order('created_at', { ascending: false });
      allEvents = data || [];
      renderEvents();
    }

    function renderEvents() {
      let filtered = allEvents;
      if (currentFilter !== 'all') {
        filtered = allEvents.filter(e => (e.admin_approval_status || 'approved') === currentFilter);
      }
      const q = document.getElementById('search').value.toLowerCase();
      if (q) filtered = filtered.filter(e => e.name?.toLowerCase().includes(q));

      document.getElementById('event-count').textContent = `${filtered.length} event${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        document.getElementById('events-tbody').innerHTML = `<tr><td colspan="6" class="table-empty">No events found.</td></tr>`;
        return;
      }

      document.getElementById('events-tbody').innerHTML = filtered.map(ev => {
        const approval = ev.admin_approval_status || (ev.organizer_id ? 'pending' : 'approved');
        return `
          <tr>
            <td>
              <div class="font-medium">${escHtml(ev.name)}</div>
              <div class="text-xs text-muted">${ev.location ? escHtml(ev.location) : ''}</div>
            </td>
            <td class="text-sm">${escHtml(ev.competition_type || '—')}</td>
            <td class="text-sm text-muted">${formatDate(ev.start_date)}</td>
            <td>${statusBadge(ev.status)}</td>
            <td>${ev.organizer_id ? statusBadge(approval) : '<span class="badge badge-gray">Coach event</span>'}</td>
            <td>
              ${ev.organizer_id && approval === 'pending' ? `
                <button class="btn btn-primary btn-sm" onclick="openReview('${ev.id}','${escHtml(ev.name)}')">
                  <i data-lucide="check-circle"></i> Review
                </button>
              ` : `<button class="btn btn-ghost btn-icon btn-sm" onclick="viewEvent('${ev.id}')"><i data-lucide="eye"></i></button>`}
            </td>
          </tr>
        `;
      }).join('');
      refreshIcons();
    }

    function filterList(q) { renderEvents(); }

    function openReview(id, name) {
      document.getElementById('review-event-id').value = id;
      document.getElementById('review-title').textContent = 'Review: ' + name;
      document.getElementById('review-desc').textContent  = 'Approve this organizer event to make it visible to coaches, or reject it with an optional reason.';
      document.getElementById('reject-reason-wrap').classList.add('hidden');
      document.getElementById('reject-reason').value = '';
      openDialog('review-dialog');
    }

    document.getElementById('reject-btn').addEventListener('click', () => {
      document.getElementById('reject-reason-wrap').classList.toggle('hidden');
    });

    async function submitApprove() {
      const id = document.getElementById('review-event-id').value;
      const { error } = await window.db.from('competitions').update({
        admin_approval_status: 'approved',
        admin_reviewed_by: adminId,
        admin_reviewed_at: new Date().toISOString(),
      }).eq('id', id);
      if (error) { showToast('Failed: ' + error.message, 'error'); return; }
      showToast('Event approved — now visible to coaches.', 'success');
      closeDialog('review-dialog');
      loadEvents();
    }

    async function submitReject() {
      const id     = document.getElementById('review-event-id').value;
      const reason = document.getElementById('reject-reason').value;
      const { error } = await window.db.from('competitions').update({
        admin_approval_status: 'rejected',
        rejection_reason: reason || null,
        admin_reviewed_by: adminId,
        admin_reviewed_at: new Date().toISOString(),
      }).eq('id', id);
      if (error) { showToast('Failed: ' + error.message, 'error'); return; }
      showToast('Event rejected.', 'info');
      closeDialog('review-dialog');
      loadEvents();
    }

    init();
  </script>
</body>
</html>
