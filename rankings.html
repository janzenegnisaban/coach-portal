<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings — KaliArena Admin</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="KaliArena" style="height:2rem;width:auto;object-fit:contain;flex-shrink:0;"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Rankings</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Rankings</h1>
              <p class="page-subtitle">System-wide team standings sorted by wins.</p>
            </div>
          </div>

          <div class="table-wrap">
            <div class="table-toolbar">
              <span class="font-medium text-sm" id="rank-count"></span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr><th>#</th><th>Team</th><th>Coach</th><th>Players</th><th>Matches</th><th>Wins</th><th>Losses</th><th>Win %</th></tr>
                </thead>
                <tbody id="rankings-tbody">
                  <tr><td colspan="8" class="table-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'rankings.html';

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);

      const { data: teams } = await window.db
        .from('teams')
        .select('id, name, wins, losses, matches_count, players_count, profiles!coach_id(first_name, last_name, email)')
        .order('wins', { ascending: false });

      const all = teams || [];
      document.getElementById('rank-count').textContent = `${all.length} team${all.length !== 1 ? 's' : ''}`;

      document.getElementById('rankings-tbody').innerHTML = all.length === 0
        ? `<tr><td colspan="8" class="table-empty">No teams to rank yet.</td></tr>`
        : all.map((t, i) => {
            const c = t.profiles;
            const coachName = c?.first_name ? `${c.first_name} ${c.last_name || ''}`.trim() : c?.email || '—';
            const wr = pct(t.wins, t.matches_count);
            return `
              <tr>
                <td>${i === 0 ? '<span class="badge badge-amber">🥇 1</span>' : i === 1 ? '<span class="badge badge-gray">🥈 2</span>' : i === 2 ? '<span class="badge badge-primary">🥉 3</span>' : `<span class="text-muted">${i+1}</span>`}</td>
                <td><div class="flex items-center gap-2"><div class="avatar avatar-sm">${getInitials(t.name)}</div><span class="font-medium">${escHtml(t.name)}</span></div></td>
                <td class="text-sm text-muted">${escHtml(coachName)}</td>
                <td>${t.players_count || 0}</td>
                <td>${t.matches_count || 0}</td>
                <td style="color:#059669;font-weight:600;">${t.wins || 0}</td>
                <td style="color:#dc2626;font-weight:600;">${t.losses || 0}</td>
                <td>
                  <div class="flex items-center gap-2">
                    <div style="width:3rem;height:.375rem;background:var(--muted);border-radius:9999px;overflow:hidden;"><div style="width:${wr}%;height:100%;background:${wr>=60?'#059669':wr>=40?'#d97706':'#dc2626'};"></div></div>
                    <span class="text-sm">${wr}%</span>
                  </div>
                </td>
              </tr>
            `;
          }).join('');

      showApp();
      refreshIcons();
    }

    init();
  </script>
</body>
</html>
