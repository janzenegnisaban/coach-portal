<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings — KaliArena Coach</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="KaliArena" style="height:2rem;width:auto;object-fit:contain;flex-shrink:0;"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Rankings</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Rankings</h1>
              <p class="page-subtitle">Overall standings across all registered teams.</p>
            </div>
          </div>

          <!-- Medal Standings from Events -->
          <div class="section-title" style="margin-bottom:.75rem;">
            <i data-lucide="trophy"></i> Medal Standings
          </div>
          <div id="medal-standings" style="margin-bottom:2rem;">
            <div class="text-sm text-muted">Loading…</div>
          </div>

          <div class="section-title" style="margin-bottom:.75rem;">
            <i data-lucide="bar-chart-2"></i> Team Records
          </div>
          <div class="table-wrap">
            <div class="table-toolbar">
              <span class="font-medium text-sm" id="rank-count"></span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Team</th>
                    <th>Coach</th>
                    <th>Players</th>
                    <th>Matches</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Win %</th>
                  </tr>
                </thead>
                <tbody id="rankings-tbody">
                  <tr><td colspan="8" class="table-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'rankings.html';

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      const myUserId = ctx.session.user.id;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);

      // Load medal standings
      await loadMedalStandings(myUserId);

      const { data: teams } = await window.db
        .from('teams')
        .select('id, name, wins, losses, matches_count, players_count, coach_id, profiles(first_name, last_name, email)')
        .order('wins', { ascending: false });

      const all = teams || [];
      document.getElementById('rank-count').textContent = `${all.length} team${all.length !== 1 ? 's' : ''}`;

      if (all.length === 0) {
        document.getElementById('rankings-tbody').innerHTML = `<tr><td colspan="8" class="table-empty">No teams ranked yet.</td></tr>`;
      } else {
        document.getElementById('rankings-tbody').innerHTML = all.map((t, i) => {
          const isMe = t.coach_id === myUserId;
          const coach = t.profiles;
          const coachName = coach?.first_name ? `${coach.first_name} ${coach.last_name || ''}`.trim() : coach?.email || '—';
          const winPct = pct(t.wins, t.matches_count);
          return `
            <tr style="${isMe ? 'background:oklch(0.5 0.19 25 / 0.06);' : ''}">
              <td>
                ${i === 0 ? '<span class="badge badge-amber">🥇 1</span>' :
                  i === 1 ? '<span class="badge badge-gray">🥈 2</span>' :
                  i === 2 ? '<span class="badge badge-primary">🥉 3</span>' :
                  `<span class="text-muted">${i + 1}</span>`}
              </td>
              <td>
                <div class="flex items-center gap-2">
                  <div class="avatar avatar-sm" style="${isMe ? 'background:var(--primary);' : ''}">${getInitials(t.name)}</div>
                  <span class="font-medium">${escHtml(t.name)}${isMe ? ' <span class="badge badge-primary" style="font-size:.7rem;">You</span>' : ''}</span>
                </div>
              </td>
              <td class="text-sm text-muted">${escHtml(coachName)}</td>
              <td>${t.players_count || 0}</td>
              <td>${t.matches_count || 0}</td>
              <td class="font-medium" style="color:#059669">${t.wins || 0}</td>
              <td class="font-medium" style="color:#dc2626">${t.losses || 0}</td>
              <td>
                <div class="flex items-center gap-2">
                  <div style="width:3rem;height:.375rem;background:var(--muted);border-radius:9999px;overflow:hidden;">
                    <div style="width:${winPct}%;height:100%;background:${winPct >= 60 ? '#059669' : winPct >= 40 ? '#d97706' : '#dc2626'};"></div>
                  </div>
                  <span class="text-sm">${winPct}%</span>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      showApp();
      refreshIcons();
    }

    async function loadMedalStandings(myUserId) {
      const el = document.getElementById('medal-standings');

      // Aggregate medals across all events per team
      const { data } = await window.db
        .from('team_event_standings')
        .select(`
          gold, silver, bronze, total_points,
          teams(id, name, coach_id),
          competitions(id, name, start_date)
        `)
        .order('total_points', { ascending: false });

      const rows = data || [];
      if (rows.length === 0) {
        el.innerHTML = `<div class="empty-state" style="padding:1.5rem;"><i data-lucide="trophy"></i><h3>No medal standings yet</h3><p>Standings will appear after organizers publish event results.</p></div>`;
        refreshIcons(); return;
      }

      // Aggregate by team across all events
      const byTeam = {};
      rows.forEach(r => {
        const tid = r.teams?.id || 'unknown';
        if (!byTeam[tid]) byTeam[tid] = { team: r.teams, gold:0, silver:0, bronze:0, pts:0, events: new Set() };
        byTeam[tid].gold   += r.gold   || 0;
        byTeam[tid].silver += r.silver || 0;
        byTeam[tid].bronze += r.bronze || 0;
        byTeam[tid].pts    += r.total_points || 0;
        if (r.competitions?.name) byTeam[tid].events.add(r.competitions.name);
      });

      const sorted = Object.values(byTeam).sort((a, b) => b.pts - a.pts || b.gold - a.gold);

      el.innerHTML = `
        <div class="card">
          <div class="card-content" style="padding:0;">
            <table style="width:100%;border-collapse:collapse;font-size:.875rem;">
              <thead>
                <tr style="background:var(--muted);">
                  <th style="padding:.625rem 1rem;text-align:left;font-size:.8125rem;">#</th>
                  <th style="padding:.625rem 1rem;text-align:left;font-size:.8125rem;">Team</th>
                  <th style="padding:.625rem 1rem;text-align:center;font-size:.8125rem;">🥇 Gold</th>
                  <th style="padding:.625rem 1rem;text-align:center;font-size:.8125rem;">🥈 Silver</th>
                  <th style="padding:.625rem 1rem;text-align:center;font-size:.8125rem;">🥉 Bronze</th>
                  <th style="padding:.625rem 1rem;text-align:center;font-size:.8125rem;">Points</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map((s, i) => {
                  const isMe = s.team?.coach_id === myUserId;
                  return `
                    <tr style="${isMe ? 'background:oklch(0.5 0.19 25 / 0.06);' : ''}border-bottom:1px solid var(--border);">
                      <td style="padding:.625rem 1rem;">
                        ${i===0?'<span class="badge badge-amber">🥇 1</span>':
                          i===1?'<span class="badge badge-gray">🥈 2</span>':
                          i===2?'<span class="badge badge-primary">🥉 3</span>':
                          `<span class="text-muted">${i+1}</span>`}
                      </td>
                      <td style="padding:.625rem 1rem;">
                        <div class="flex items-center gap-2">
                          <div class="avatar avatar-sm" style="${isMe?'background:var(--primary);':''}">${getInitials(s.team?.name||'?')}</div>
                          <div>
                            <div class="font-medium">${escHtml(s.team?.name||'—')}${isMe?' <span class="badge badge-primary" style="font-size:.7rem;">You</span>':''}</div>
                            <div class="text-xs text-muted">${s.events.size} event${s.events.size!==1?'s':''}</div>
                          </div>
                        </div>
                      </td>
                      <td style="padding:.625rem 1rem;text-align:center;font-weight:700;color:#92400e;">${s.gold}</td>
                      <td style="padding:.625rem 1rem;text-align:center;font-weight:600;color:#52525b;">${s.silver}</td>
                      <td style="padding:.625rem 1rem;text-align:center;font-weight:600;color:#78350f;">${s.bronze}</td>
                      <td style="padding:.625rem 1rem;text-align:center;font-weight:700;">${s.pts}</td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      refreshIcons();
    }

    init();
  </script>
</body>
</html>
