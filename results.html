<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — KaliArena Coach</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo"><span class="sidebar-logo-text">KaliArena</span></div>
      <div class="sidebar-badge-area" id="sidebar-badge"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-content">
      <header class="portal-header">
        <div class="header-left"><div class="header-title">Results</div></div>
        <div class="header-right">
          <span class="header-user-name" id="header-user-name"></span>
          <div class="header-avatar" id="header-avatar">?</div>
        </div>
      </header>

      <main class="page-content">
        <div class="page-wrap">
          <div class="page-header">
            <div class="page-header-text">
              <h1 class="page-title">Results</h1>
              <p class="page-subtitle">Player performance and match statistics.</p>
            </div>
          </div>

          <!-- Summary stats -->
          <div class="stats-grid" id="summary-stats" style="margin-bottom:1.5rem;"></div>

          <div class="table-wrap">
            <div class="table-toolbar">
              <span class="font-medium text-sm">Player Performance</span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>Player</th>
                    <th>Belt</th>
                    <th>Matches</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Win Rate</th>
                    <th>Medals</th>
                  </tr>
                </thead>
                <tbody id="results-tbody">
                  <tr><td colspan="7" class="table-empty">Loading…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

      <nav class="mobile-nav" id="mobile-nav"></nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PAGE = 'results.html';

    async function init() {
      const ctx = await requireRole();
      if (!ctx) return;
      renderNav(PAGE);
      setHeaderUser(ctx.profile);

      const { data: players } = await window.db
        .from('players')
        .select('*')
        .eq('coach_id', ctx.session.user.id)
        .order('wins', { ascending: false });

      const all = players || [];
      const totalM = all.reduce((s, p) => s + (p.matches || 0), 0);
      const totalW = all.reduce((s, p) => s + (p.wins || 0), 0);
      const totalL = all.reduce((s, p) => s + (p.losses || 0), 0);
      const totalMedals = all.reduce((s, p) => s + (p.medals || 0), 0);

      document.getElementById('summary-stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon tile-primary"><i data-lucide="users"></i></div><div class="stat-label">Players</div><div class="stat-value">${all.length}</div></div>
        <div class="stat-card"><div class="stat-icon tile-amber"><i data-lucide="swords"></i></div><div class="stat-label">Total Matches</div><div class="stat-value">${totalM}</div></div>
        <div class="stat-card"><div class="stat-icon tile-emerald"><i data-lucide="check-circle"></i></div><div class="stat-label">Total Wins</div><div class="stat-value">${totalW}</div></div>
        <div class="stat-card"><div class="stat-icon tile-amber"><i data-lucide="medal"></i></div><div class="stat-label">Total Medals</div><div class="stat-value">${totalMedals}</div></div>
      `;

      if (all.length === 0) {
        document.getElementById('results-tbody').innerHTML = `<tr><td colspan="7" class="table-empty">No players found. Add players to see results.</td></tr>`;
      } else {
        document.getElementById('results-tbody').innerHTML = all.map(p => {
          const wr = pct(p.wins, p.matches);
          return `
            <tr>
              <td>
                <div class="flex items-center gap-2">
                  <div class="avatar avatar-sm">${getInitials(p.name)}</div>
                  <span class="font-medium">${escHtml(p.name)}</span>
                </div>
              </td>
              <td>${p.belt_level ? `<span class="badge badge-gray">${escHtml(p.belt_level)}</span>` : '—'}</td>
              <td>${p.matches || 0}</td>
              <td><span style="color:#059669;font-weight:600;">${p.wins || 0}</span></td>
              <td><span style="color:#dc2626;font-weight:600;">${p.losses || 0}</span></td>
              <td>
                <div class="flex items-center gap-2">
                  <div style="width:3.5rem;height:.375rem;background:var(--muted);border-radius:9999px;overflow:hidden;">
                    <div style="width:${wr}%;height:100%;background:${wr >= 60 ? '#059669' : wr >= 40 ? '#d97706' : '#dc2626'};transition:width .3s;"></div>
                  </div>
                  <span class="text-sm">${wr}%</span>
                </div>
              </td>
              <td>${p.medals ? `<span class="badge badge-amber">🥇 ${p.medals}</span>` : '—'}</td>
            </tr>
          `;
        }).join('');
      }

      showApp();
      refreshIcons();
    }

    init();
  </script>
</body>
</html>
